version: '3.8'

name: devops-app

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        - REACT_APP_API_URL=
    ports:
      - "8002:8000"
    environment:
      - PORT=8000
      - DATABASE=mongodb://mongo:27017/ecommerce
      - JWT_SECRET=demo_jwt_secret
      - BRAINTREE_MERCHANT_ID=demo_merchant_id
      - BRAINTREE_PUBLIC_KEY=demo_public_key
      - BRAINTREE_PRIVATE_KEY=demo_private_key
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  jenkins-data:
  mongo-data:
