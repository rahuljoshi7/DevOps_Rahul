version: '3.8'

name: devops-app

services:

  app:
    build:
      context: .
      args:
        - REACT_APP_API_URL=
    ports:
      - "8002:8000"
    environment:
      - PORT=8000
      - DATABASE=mongodb://mongo:27017/ecommerce
      - JWT_SECRET=demo_jwt_secret
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: devops-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mongo-data:
